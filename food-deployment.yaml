apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-app
  namespace: hyderabad-food
  labels:
    app: food-app
    env: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: food-app
  template:
    metadata:
      labels:
        app: food-app
        env: production
    spec:
      containers:
      - name: food-container
        image: nginx:1.25
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: food-config
        env:
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: food-secret
              key: ADMIN_PASSWORD
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
